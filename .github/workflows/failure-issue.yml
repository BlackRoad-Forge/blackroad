name: CI Failure Tracker

on:
  workflow_run:
    workflows: ["CORE CI"]
    types: [completed]

permissions:
  issues: write

jobs:
  report:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const runName = context.payload.workflow_run.name;
            const runUrl = context.payload.workflow_run.html_url;
            const branch = context.payload.workflow_run.head_branch;

            await github.rest.issues.create({
              ...context.repo,
              title: `CI failed: ${runName} on ${branch}`,
              body: `## CI Failure Report\n\n- **Workflow:** ${runName}\n- **Branch:** ${branch}\n- **Run:** ${runUrl}\n- **Time:** ${new Date().toISOString()}\n\nPlease investigate and fix.`,
              labels: ['ci-failure']
            })
