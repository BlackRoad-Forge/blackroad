name = "blackroad-api-gateway"
main = "workers/api-gateway.js"
compatibility_date = "2024-12-01"

[vars]
API_ORIGIN = "https://api.blackroad.io"
PAGES_ORIGIN = "https://blackroad.io"

[env.production]
name = "blackroad-api-gateway"
routes = [
  { pattern = "blackroad.io/api/*", zone_name = "blackroad.io" }
]

[env.staging]
name = "blackroad-api-gateway-staging"
